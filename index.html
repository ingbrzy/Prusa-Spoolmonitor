<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPOOL MONITOR</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#E8500A">
<link rel="manifest" href="./manifest.json">

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%23222%22 stroke=%22%23444%22 stroke-width=%222%22/><circle cx=%2250%22 cy=%2250%22 r=%2238%22 fill=%22%23E8500A%22/><circle cx=%2250%22 cy=%2250%22 r=%2218%22 fill=%22%23222%22 stroke=%22%23444%22 stroke-width=%222%22/><circle cx=%2250%22 cy=%2250%22 r=%2210%22 fill=%22black%22/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E8500A;
    --orange-light: #F4651F;
    --red: #d32f2f;
    --pulse-shadow: rgba(211, 47, 47, 0.25);
    --dark: #1a1a1a;
    --text: #333;
    --text-light: #666;
    --border: #e0e0e0;
    --bg: #f5f5f5;
    --card-bg: #ffffff;
    --gauge-bg: #e8e8e8;
    --gauge-track: #e0e0e0;
    --loader-logo: #1a1a1a;
  }

  body.dark-theme {
    --bg: #121212;
    --card-bg: #1e1e1e;
    --text: #e0e0e0;
    --text-light: #999;
    --border: #333;
    --dark: #ffffff;
    --red: #ff5252;
    --pulse-shadow: rgba(255, 82, 82, 0.25);
    --gauge-bg: #2a2a2a;
    --gauge-track: #3a3a3a;
    --loader-logo: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background-color 0.3s, color 0.3s;
  }

  /* HEADER */
  .header {
    background: var(--card-bg);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    transition: background-color 0.3s, border-color 0.3s;
  }

  body.dark-theme .header { background: #c0c0c0; }
  .header-logo { display: flex; align-items: center; flex: 1; }
  .mas-img { height: 44px; width: auto; object-fit: contain; transition: height 0.3s; }
  
  .header-title-container { display: flex; align-items: center; justify-content: center; flex: 2; }
  .prusa-logo { display: flex; align-items: center; justify-content: flex-end; flex: 1; }
  .prusa-img { height: 44px; width: auto; object-fit: contain; transition: height 0.3s; }

  /* TEXT LOGO STYLES */
  .logo-text { display: flex; align-items: center; justify-content: center; gap: 12px; white-space: nowrap; }
  .logo-bold { font-weight: 800; letter-spacing: -1px; }
  .logo-dot { background-color: var(--orange); border-radius: 50%; }
  .logo-light { font-weight: 300; letter-spacing: 4px; }
  .header-logo-text { color: var(--dark); transition: color 0.3s; }
  .header-logo-text .logo-bold { font-size: 24px; }
  .header-logo-text .logo-light { font-size: 21px; }
  .header-logo-text .logo-dot { width: 8px; height: 8px; }
  .loader-logo-text { color: var(--loader-logo); transition: color 0.3s; }
  .loader-logo-text .logo-bold { font-size: 32px; }
  .loader-logo-text .logo-light { font-size: 28px; }
  .loader-logo-text .logo-dot { width: 10px; height: 10px; }

  /* DASHBOARD GRID */
  .dashboard { padding: 20px 24px; max-width: 1600px; margin: 0 auto; transition: padding 0.3s; }
  .section-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 14px; transition: gap 0.3s, margin 0.3s; }

  /* ANIMATIONS */
  @keyframes cardPop { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes gaugeFill { 0% { stroke-dashoffset: 232.48; } 100% { stroke-dashoffset: var(--target-offset); } }
  @keyframes alertBlink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes cardPulseAlert { 0%, 100% { border-color: var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.06); } 50% { border-color: var(--red); box-shadow: 0 0 16px var(--pulse-shadow); } }

  /* CARDS */
  .card {
    background: var(--card-bg);
    border-radius: 10px;
    padding: 16px 18px 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: box-shadow 0.2s, background-color 0.3s, border-color 0.3s, padding 0.3s, gap 0.3s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.15); }

  /* PRINTER TYPES COLORS */
  .card.type-mk3s { --card-bg: #f0f7ff; --border: #cce4ff; }
  .card.type-mk3s .printer-type { color: #1976d2; }
  .card.type-mk4s { --card-bg: #f2fcf5; --border: #c8e6c9; }
  .card.type-mk4s .printer-type { color: #388e3c; }
  .card.type-xl { --card-bg: #fff8f0; --border: #ffe0b2; }
  .card.type-xl .printer-type { color: #f57c00; }
  .card.type-xl2 { --card-bg: #fdf4ff; --border: #e1bee7; }
  .card.type-xl2 .printer-type { color: #8e24aa; }

  body.dark-theme .card.type-mk3s { --card-bg: #151e29; --border: #20354b; }
  body.dark-theme .card.type-mk3s .printer-type { color: #64b5f6; }
  body.dark-theme .card.type-mk4s { --card-bg: #152219; --border: #24422c; }
  body.dark-theme .card.type-mk4s .printer-type { color: #81c784; }
  body.dark-theme .card.type-xl { --card-bg: #291e14; --border: #4a3018; }
  body.dark-theme .card.type-xl .printer-type { color: #ffb74d; }
  body.dark-theme .card.type-xl2 { --card-bg: #26162b; --border: #42214d; }
  body.dark-theme .card.type-xl2 .printer-type { color: #ba68c8; }

  /* ANIMATION APPLICATION */
  .card.animate-pop { opacity: 0; animation: cardPop 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; animation-delay: var(--delay, 0s); }
  .card.alert-pulse:not(.animate-pop) { animation: cardPulseAlert 2s infinite ease-in-out; animation-delay: var(--delay, 0s); }
  .card.animate-pop.alert-pulse { animation: cardPop 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards, cardPulseAlert 2s infinite ease-in-out; animation-delay: var(--delay, 0s); }

  .card-header { white-space: nowrap; overflow: hidden; min-height: 24px; display: flex; align-items: baseline; gap: 10px; transition: gap 0.3s; }
  .printer-type { font-size: 18px; font-weight: 700; flex-shrink: 0; letter-spacing: 0.5px; transition: font-size 0.3s; }
  .printer-name { font-size: 14px; font-weight: 600; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: font-size 0.3s; }

  /* GAUGE */
  .gauge-container { position: relative; width: 100%; aspect-ratio: 2/1.05; }
  .gauge-svg { width: 100%; height: 100%; }
  .gauge-value { position: absolute; bottom: 12px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 1px; transition: bottom 0.3s; }
  .val-text { font-size: 22px; font-weight: 700; line-height: 1; transition: font-size 0.3s; }
  .val-label { font-size: 9px; color: var(--text-light); font-weight: 500; transition: font-size 0.3s; }

  /* STATS */
  .material-row { display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 22px; transition: gap 0.3s; }
  .color-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.12); flex-shrink: 0; transition: width 0.3s, height 0.3s; }
  body.dark-theme .color-dot { border: 2px solid rgba(255,255,255,0.15); }
  .material-name { font-size: 13px; font-weight: 500; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: font-size 0.3s; }
  .material-name.empty { color: var(--text-light); }
  .stats-container { display: flex; justify-content: space-evenly; align-items: center; width: 100%; }
  .stat-col { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
  .stat-label { font-size: 10px; color: var(--text-light); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; transition: font-size 0.3s; }
  .stat-value { font-size: 19px; font-weight: 700; color: var(--dark); line-height: 1.1; transition: font-size 0.3s; }
  .stat-value.empty { color: var(--text-light); }
  .timestamp { font-size: 10px; color: var(--text-light); margin-top: 2px; text-align: center; transition: font-size 0.3s; }

  /* STATUS BADGE */
  .status-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px; align-self: center; transition: font-size 0.3s, padding 0.3s; }
  .status-ok { background: #e8f5e9; color: #2e7d32; }
  .status-low { background: #fff3e0; color: #e65100; animation: alertBlink 2s infinite ease-in-out; animation-delay: var(--delay, 0s); }
  .status-empty { background: #fce4e4; color: #c62828; border: 1px solid #ef9a9a; animation: alertBlink 2s infinite ease-in-out; animation-delay: var(--delay, 0s); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* LOADING SCREEN */
  .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease-out, visibility 0.5s; }
  .loading-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .loader-container { display: flex; flex-direction: column; align-items: center; gap: 30px; }
  .prusa-loader { width: 64px; height: 64px; transition: filter 0.3s; }
  body.dark-theme .prusa-loader { filter: invert(1) hue-rotate(180deg) brightness(1.2); }
  .loading-text { margin-top: 15px; font-size: 12px; font-weight: 600; letter-spacing: 2px; color: var(--text-light); text-transform: uppercase; }

  /* CONTROLS */
  .controls { padding: 12px 24px 0; display: flex; align-items: center; justify-content: space-between; max-width: 1600px; margin: 0 auto; }
  .last-update { font-size: 12px; color: var(--text-light); }
  .btn-icon { background: var(--card-bg); border: 1px solid var(--border); border-radius: 7px; padding: 7px 14px; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; transition: all 0.2s; font-family: 'Montserrat', sans-serif; }
  .btn-icon:hover { background: var(--orange); color: white; border-color: var(--orange); }
  .refresh-indicator { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

  /* CONFIG PANEL */
  .config-panel { position: fixed; top: 0; right: 0; width: 100%; max-width: 380px; height: 100vh; background: var(--card-bg); box-shadow: -4px 0 24px rgba(0,0,0,0.15); z-index: 200; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
  .config-panel.open { transform: translateX(0); }
  .config-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .config-body { flex: 1; padding: 20px 24px; overflow-y: auto; }
  .config-field { margin-bottom: 20px; }
  .config-label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 8px; }
  .config-input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-family: inherit; }
  .config-btn { width: 100%; padding: 12px; background: var(--orange); color: white; border: none; border-radius: 7px; font-weight: 700; cursor: pointer; margin-top: 10px;}
  
  /* TOGGLE SWITCH */
  .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .3s; border-radius: 24px; }
  .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--orange); }
  input:checked + .slider:before { transform: translateX(20px); }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 190; display: none; }
  .overlay.show { display: block; }

  /* PRÁZDNY DRŽIAK */
  .card.empty-holder { opacity: 0.75; --card-bg: #f9f9f9; --border: #e0e0e0; }
  .card.empty-holder .printer-type { color: var(--text-light) !important; }
  body.dark-theme .card.empty-holder { opacity: 0.6; --card-bg: #181818; --border: #333333; }

  /* ───────────────────────────────────────────────────────── */
  /* KOMPAKTNÝ REŽIM (COMPACT MODE)                            */
  /* ───────────────────────────────────────────────────────── */
  body.compact-mode .dashboard { padding: 10px 14px; }
  body.compact-mode .section-row { gap: 8px; margin-bottom: 8px; }
  body.compact-mode .card { padding: 10px 12px 10px; gap: 6px; }
  body.compact-mode .card-header { min-height: 18px; gap: 6px; }
  body.compact-mode .printer-type { font-size: 14px; }
  body.compact-mode .printer-name { font-size: 12px; }
  body.compact-mode .gauge-value { bottom: 6px; }
  body.compact-mode .val-text { font-size: 16px; }
  body.compact-mode .val-label { font-size: 8px; }
  body.compact-mode .material-row { min-height: 16px; gap: 5px; }
  body.compact-mode .color-dot { width: 14px; height: 14px; }
  body.compact-mode .material-name { font-size: 11px; }
  body.compact-mode .stat-label { font-size: 8px; }
  body.compact-mode .stat-value { font-size: 14px; }
  body.compact-mode .status-badge { font-size: 9px; padding: 2px 7px; }
  body.compact-mode .timestamp { font-size: 8px; margin-top: 0; }

  /* RESPOSIVE */
  @media (max-width: 1200px) { .section-row { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 992px) { .section-row { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 768px) { 
    .section-row { grid-template-columns: repeat(2, 1fr); } 
    .mas-img, .prusa-img { height: 36px; }
    .header-logo-text .logo-bold { font-size: 18px; }
    .header-logo-text .logo-light { font-size: 16px; }
    .header-logo-text .logo-dot { width: 6px; height: 6px; }
    .logo-text { gap: 8px; }
  }
  @media (max-width: 480px) { 
    .section-row { grid-template-columns: 1fr; } 
    .header { padding: 12px 16px; } 
    .mas-img, .prusa-img { height: 26px; }
    .header-logo-text .logo-bold { font-size: 15px; }
    .header-logo-text .logo-light { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader-container">
    <div class="logo-text loader-logo-text">
      <span class="logo-bold">SPOOL</span>
      <span class="logo-dot"></span>
      <span class="logo-light">MONITOR</span>
    </div>
    <img src="loading-wheel-4s.svg" class="prusa-loader" alt="Načítavam...">

  </div>
</div>

<div class="overlay" id="overlay" onclick="closeConfig()"></div>

<div class="config-panel" id="configPanel">
  <div class="config-header">
    <div style="font-weight: 800; font-size: 18px; letter-spacing: 1px;">NASTAVENIA</div>
    <button style="background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-light);" onclick="closeConfig()">✕</button>
  </div>
  <div class="config-body">
    <div class="config-field" style="display:flex; align-items:center; justify-content:space-between;">
      <label class="config-label" style="margin-bottom:0;">Tmavý režim</label>
      <label class="switch">
        <input type="checkbox" id="cfgDarkMode" onchange="toggleDarkMode()">
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="config-field" style="display:flex; align-items:center; justify-content:space-between;">
      <label class="config-label" style="margin-bottom:0;">Kompaktný režim</label>
      <label class="switch">
        <input type="checkbox" id="cfgCompactMode" onchange="toggleCompactMode()">
        <span class="slider"></span>
      </label>
    </div>

    <div class="config-field">
      <label class="config-label">Limit varovania v gramoch</label>
      <input class="config-input" id="cfgThreshold" type="number" value="50" min="0" max="500" step="10">
    </div>

    <div class="config-field">
      <label class="config-label">Interval obnovy (minúty)</label>
      <input class="config-input" id="cfgInterval" type="number" value="2" min="1" max="60">
    </div>

    <button class="config-btn" onclick="saveAndLoad()">ULOŽIŤ A OBNOVIŤ</button>
  </div>
</div>

<div class="header">
  <div class="header-logo"><img src="MAS.png" alt="MAS" class="mas-img"></div>
  <div class="header-title-container">
    <div class="logo-text header-logo-text">
      <span class="logo-bold">SPOOL</span>
      <span class="logo-dot"></span>
      <span class="logo-light">MONITOR</span>
    </div>
  </div>
  <div class="prusa-logo"><img src="prusa.svg" alt="Prusa" class="prusa-img"></div>
</div>

<div class="controls">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="refresh-indicator" id="refreshDot"></div>
    <span class="last-update" id="lastUpdate">Čakám na dáta...</span>
  </div>
  <div style="display:flex; gap:8px;">
    <button class="btn-icon" onclick="refreshData()">↻ OBNOVIŤ</button>
    <button class="btn-icon" onclick="openConfig()">⚙ NASTAVENIA</button>
  </div>
</div>

<div class="dashboard">
  <div class="section-row" id="row-mk3s"></div>
  <div class="section-row" id="row-xl"></div>
  <div class="section-row" id="row-xl2"></div>
</div>

<script>
// ─── PWA ───────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(e => console.error(e));
  });
}

// ─── CONFIG & STATE ────────────────────────────────────────────────────────
const URL = 'https://script.google.com/macros/s/AKfycbx4YtjqbeYbPZgB22esHfnlaBA4NlI_7xpX-I61wQbgcZZI2JWZWCxIyYRocMi9wTYX/exec';
let CONFIG = {
  interval: parseInt(localStorage.getItem('interval') || '2'),
  threshold: parseInt(localStorage.getItem('threshold') || '50'),
  darkMode: localStorage.getItem('darkMode') === 'true',
  compactMode: localStorage.getItem('compactMode') === 'true'
};
let refreshTimer = null;
let isInitialLoad = true;

// ─── INIT THEME & MODES ────────────────────────────────────────────────────
if (CONFIG.darkMode) {
  document.body.classList.add('dark-theme');
  document.getElementById('cfgDarkMode').checked = true;
}
if (CONFIG.compactMode) {
  document.body.classList.add('compact-mode');
  document.getElementById('cfgCompactMode').checked = true;
}

const MK3S_SPOOLS = [
  { id: 'spool-01', label: 'PRUSA 01', type: 'MK3S' },
  { id: 'spool-02', label: 'PRUSA 02', type: 'MK3S' },
  { id: 'spool-03', label: 'PRUSA 03', type: 'MK3S' },
  { id: 'spool-04', label: 'PRUSA 04', type: 'MK4S' },
  { id: 'spool-05', label: 'PRUSA 05', type: 'MK4S' }
];
const XL_SPOOLS = [
  { id: 'spool-XL01', label: 'TOOL 01', type: 'XL' },
  { id: 'spool-XL02', label: 'TOOL 02', type: 'XL' },
  { id: 'spool-XL03', label: 'TOOL 03', type: 'XL' },
  { id: 'spool-XL04', label: 'TOOL 04', type: 'XL' },
  { id: 'spool-XL05', label: 'TOOL 05', type: 'XL' }
];
const XL2_SPOOLS = [
  { id: 'spool-XL2-01', label: 'TOOL 01', type: 'XL2' },
  { id: 'spool-XL2-02', label: 'TOOL 02', type: 'XL2' }
];

// ─── GAUGE DRAWING ─────────────────────────────────────────────────────────
function createGaugeSVG(value, max) {
  const pct = max > 0 ? Math.min(value / max, 1) : 0;
  const cx = 100, cy = 98, r = 74;
  const rad = Math.PI;
  const sx = cx + r * Math.cos(rad), sy = cy - r * Math.sin(rad);
  const ex = cx + r * Math.cos(0), ey = cy - r * Math.sin(0);
  const pathDef = `M ${sx} ${sy} A ${r} ${r} 0 1 1 ${ex} ${ey}`;
  const color = value <= 0 ? 'var(--gauge-track)' : value < 100 ? 'var(--red)' : 'var(--orange)';
  const pathLength = 232.48;
  const targetOffset = pathLength * (1 - pct);
  const animStyle = isInitialLoad 
    ? `style="--target-offset: ${targetOffset}; animation: gaugeFill 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;"`
    : `style="stroke-dashoffset: ${targetOffset};"`;

  return `<svg viewBox="0 0 200 108" class="gauge-svg">
    <path d="${pathDef}" fill="none" stroke="var(--gauge-track)" stroke-width="13" stroke-linecap="round"/>
    ${pct > 0.001 ? `<path d="${pathDef}" fill="none" stroke="${color}" stroke-width="13" stroke-linecap="round" stroke-dasharray="${pathLength}" ${animStyle} />` : ''}
  </svg>`;
}

// ─── CARD RENDERING ────────────────────────────────────────────────────────
function renderCard(spool, data, index) {
  const hasData = !!data;
  const weight = (hasData && data.weight !== null) ? data.weight : 0;
  const isEmpty = !hasData || data.isEmpty || (data.staleMinutes > 120);
  
  let statusClass = "status-ok", statusText = "OK";
  let isAlert = false;

  if (isEmpty) { statusClass = "status-empty"; statusText = "Prázdny držiak"; isAlert = true; }
  else if (weight === 0) { statusClass = "status-empty"; statusText = "Prázdna cievka"; isAlert = true; }
  else if (weight < CONFIG.threshold) { statusClass = "status-low"; statusText = "Málo filamentu"; isAlert = true; }

  const weightDisp = isEmpty ? "-" : weight.toLocaleString('sk', {minimumFractionDigits:1});
  const lengthDisp = isEmpty ? "-" : (data.length || 0).toLocaleString('sk', {minimumFractionDigits:1});
  const material = isEmpty ? "-" : (data.material || "Neznámy");
  const color = isEmpty ? "transparent" : `#${data.color}`;
  
  // LOGIKA PRE RELATÍVNY ČAS
  let timeText = spool.id;
  if (hasData && data.staleMinutes !== undefined && data.staleMinutes !== null) {
    const m = data.staleMinutes;
    if (m === 0) timeText = "práve teraz";
    else if (m < 60) timeText = `pred ${m} min`;
    else if (m < 1440) timeText = `pred ${Math.floor(m/60)} hod`;
    else timeText = `pred ${Math.floor(m/1440)} dňami`;
  } else if (hasData && data.ts) {
    timeText = data.ts; // Záloha
  } else {
    timeText = "-";
  }

  const typeClass = 'type-' + spool.type.toLowerCase();
  const animClass = isInitialLoad ? ' animate-pop' : '';
  const alertClass = isAlert ? ' alert-pulse' : '';
  const animStyle = isInitialLoad ? `style="--delay: ${index * 0.05}s;"` : '';

  let statsHtml = `<div class="stat-col"><span class="stat-label">Teplota</span><span class="stat-value${isEmpty ? ' empty' : ''}">${!isEmpty && data.temp ? data.temp+'°C' : '-'}</span></div>
                   <div class="stat-col"><span class="stat-label">Dĺžka (m)</span><span class="stat-value${isEmpty ? ' empty' : ''}">${lengthDisp}</span></div>
                   <div class="stat-col"><span class="stat-label">Vlhkosť</span><span class="stat-value${isEmpty ? ' empty' : ''}">${!isEmpty && data.hum ? data.hum+'%' : '-'}</span></div>`;

  const gaugeVal = isEmpty ? 0 : weight;

  return `<div class="card ${typeClass}${isEmpty ? ' empty-holder' : ''}${animClass}${alertClass}" ${animStyle}>
    <div class="card-header"><span class="printer-type">${spool.type}</span><span class="printer-name">${spool.label}</span></div>
    <div class="gauge-container">${createGaugeSVG(gaugeVal, 1000)}
      <div class="gauge-value" style="color:${weight < CONFIG.threshold && !isEmpty ? 'var(--red)' : 'var(--dark)'}">
        <span class="val-text">${weightDisp}</span><span class="val-label">Váha (g)</span>
      </div>
    </div>
    <div class="material-row">
      ${!isEmpty ? `<div class="color-dot" style="background:${color}"></div>` : ''}
      <span class="material-name${isEmpty ? ' empty' : ''}">${material}</span>
    </div>
    <div class="stats-container">${statsHtml}</div>
    <span class="status-badge ${statusClass}"><span class="status-dot"></span>${statusText}</span>
    <div class="timestamp">${timeText}</div>
  </div>`;
}

// ─── DATA FETCHING ─────────────────────────────────────────────────────────
async function refreshData() {
  document.getElementById('refreshDot').style.background = '#ff9800';
  try {
    const res = await fetch(URL + '?action=getData');
    const json = await res.json();
    const map = {};
    json.spools.forEach(s => map[s.id] = s);

    if (map['spool-XL05']) {
      ['spool-XL01','spool-XL02','spool-XL03','spool-XL04'].forEach(id => {
        if (map[id]) { map[id].temp = map['spool-XL05'].temp; map[id].hum = map['spool-XL05'].hum; }
      });
    }
    if (map['spool-XL2-01']) {
      if (map['spool-XL2-02']) { map['spool-XL2-02'].temp = map['spool-XL2-01'].temp; map['spool-XL2-02'].hum = map['spool-XL2-01'].hum; }
    }

    document.getElementById('row-mk3s').innerHTML = MK3S_SPOOLS.map((s,i) => renderCard(s, map[s.id], i)).join('');
    // OPRAVENÉ NA XL_SPOOLS:
    document.getElementById('row-xl').innerHTML = XL_SPOOLS.map((s,i) => renderCard(s, map[s.id], i+5)).join('');
    document.getElementById('row-xl2').innerHTML = XL2_SPOOLS.map((s,i) => renderCard(s, map[s.id], i+10)).join('');
    
    document.getElementById('lastUpdate').textContent = 'Aktualizované: ' + new Date().toLocaleTimeString('sk');
    if (isInitialLoad) {
      setTimeout(() => {
        document.getElementById('loadingOverlay').classList.add('hidden');
        isInitialLoad = false;
      }, 800);
    }
  } catch (e) {
    console.error(e);
    document.getElementById('lastUpdate').textContent = 'Chyba pripojenia';
  }
  document.getElementById('refreshDot').style.background = '#4caf50';
}

// ─── UI CONTROLS ───────────────────────────────────────────────────────────
function openConfig() { 
  document.getElementById('cfgInterval').value = CONFIG.interval;
  document.getElementById('cfgThreshold').value = CONFIG.threshold;
  document.getElementById('configPanel').classList.add('open'); 
  document.getElementById('overlay').classList.add('show'); 
}
function closeConfig() { 
  document.getElementById('configPanel').classList.remove('open'); 
  document.getElementById('overlay').classList.remove('show'); 
}
function toggleDarkMode() {
  CONFIG.darkMode = document.getElementById('cfgDarkMode').checked;
  localStorage.setItem('darkMode', CONFIG.darkMode);
  document.body.classList.toggle('dark-theme', CONFIG.darkMode);
}
function toggleCompactMode() {
  CONFIG.compactMode = document.getElementById('cfgCompactMode').checked;
  localStorage.setItem('compactMode', CONFIG.compactMode);
  document.body.classList.toggle('compact-mode', CONFIG.compactMode);
}
function saveAndLoad() {
  CONFIG.interval = parseInt(document.getElementById('cfgInterval').value) || 2;
  CONFIG.threshold = parseInt(document.getElementById('cfgThreshold').value) || 50;
  localStorage.setItem('interval', CONFIG.interval);
  localStorage.setItem('threshold', CONFIG.threshold);
  closeConfig();
  location.reload();
}

window.addEventListener('DOMContentLoaded', () => {
  refreshData();
  setInterval(refreshData, CONFIG.interval * 60000);
});
</script>
