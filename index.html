<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filament Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E8500A;
    --orange-light: #F4651F;
    --dark: #1a1a1a;
    --text: #333;
    --text-light: #666;
    --border: #e0e0e0;
    --bg: #f5f5f5;
    --card-bg: #ffffff;
    --gauge-bg: #e8e8e8;
    --gauge-track: #e0e0e0;
  }

  /* DARK THEME VARIABLES */
  body.dark-theme {
    --bg: #121212;
    --card-bg: #1e1e1e;
    --text: #e0e0e0;
    --text-light: #999;
    --border: #333;
    --dark: #ffffff;
    --gauge-bg: #2a2a2a;
    --gauge-track: #3a3a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background-color 0.3s, color 0.3s;
  }

  /* HEADER */
  .header {
    background: var(--card-bg);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    transition: background-color 0.3s, border-color 0.3s;
  }

  body.dark-theme .header { background: #c0c0c0; }

  .header-logo { display: flex; align-items: center; }
  .mas-img { height: 44px; width: auto; object-fit: contain; transition: height 0.3s; }
  
  .header-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--dark);
    transition: font-size 0.3s, color 0.3s;
    text-align: center;
  }

  body.dark-theme .header-title { color: #1a1a1a; }

  .prusa-logo { display: flex; align-items: center; justify-content: flex-end; }
  .prusa-img { height: 44px; width: auto; object-fit: contain; transition: height 0.3s; }

  body.dark-theme .mas-img, body.dark-theme .prusa-img { filter: drop-shadow(0px 0px 2px rgba(255,255,255,0.2)); }

  /* MAIN GRID */
  .dashboard {
    padding: 20px 24px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .section-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    margin-bottom: 14px;
  }

  /* ───────────────────────────────────────────────────────── */
  /* ANIMÁCIE                                                  */
  /* ───────────────────────────────────────────────────────── */
  @keyframes cardPop {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @keyframes gaugeFill {
    0% { stroke-dashoffset: 232.48; }
    100% { stroke-dashoffset: var(--target-offset); }
  }

  /* Nová animácia pre blikanie varovného textu */
  @keyframes alertBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* KARTA BEZ ANIMÁCIE (ŠTANDARDNÝ STAV) */
  .card {
    background: var(--card-bg);
    border-radius: 10px;
    padding: 16px 18px 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: box-shadow 0.2s, background-color 0.3s, border-color 0.3s;
  }

  .card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  /* TRIEDA PRIDÁVANÁ LEN PRI PRVOM NAČÍTANÍ */
  .animate-pop {
    opacity: 0;
    animation: cardPop 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }

  .card-header {
    white-space: nowrap;
    overflow: hidden;
    min-height: 24px;
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .printer-type {
    font-family: 'Montserrat', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--orange);
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }

  .printer-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
    letter-spacing: 0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* GAUGE */
  .gauge-container {
    position: relative;
    width: 100%;
    aspect-ratio: 2/1.05;
  }

  .gauge-svg {
    width: 100%;
    height: 100%;
  }

  .gauge-value {
    position: absolute;
    bottom: 18px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: var(--dark);
    font-family: 'Montserrat', sans-serif;
    line-height: 1;
  }

  .gauge-minmax {
    position: absolute;
    bottom: 2px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 4px;
  }

  .gauge-minmax span {
    font-size: 9px;
    color: var(--text-light);
    font-weight: 500;
  }

  /* COLOR DOT + MATERIAL */
  .material-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 22px;
  }

  .color-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.12);
    flex-shrink: 0;
  }
  body.dark-theme .color-dot { border: 2px solid rgba(255,255,255,0.15); }

  .material-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .material-name.empty {
    color: var(--text-light);
  }

  /* STATS */
  .stat-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-light);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.1;
  }

  .stat-value.empty { color: var(--text-light); }

  .timestamp {
    font-size: 10px;
    color: var(--text-light);
    font-weight: 400;
    margin-top: 2px;
    text-align: center;
  }

  /* STATUS BADGE */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.3px;
    align-self: center;
  }

  .status-ok { background: #e8f5e9; color: #2e7d32; }
  
  /* Pridané blikanie (alertBlink) pre kritické stavy */
  .status-low { 
    background: #fff3e0; 
    color: #e65100; 
    animation: alertBlink 1.5s infinite ease-in-out; 
  }
  .status-empty { 
    background: #fce4e4; 
    color: #c62828; 
    border: 1px solid #ef9a9a; 
    animation: alertBlink 1.5s infinite ease-in-out; 
  }
  
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  body.dark-theme .status-ok { background: rgba(46, 125, 50, 0.2); color: #81c784; }
  body.dark-theme .status-low { background: rgba(230, 81, 0, 0.2); color: #ffb74d; }
  body.dark-theme .status-empty { background: rgba(198, 40, 40, 0.2); color: #e57373; border-color: rgba(229, 115, 115, 0.3); }

  /* LOADER */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 16px;
    transition: opacity 0.4s, background-color 0.3s;
  }

  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .loader-ring {
    width: 48px;
    height: 48px;
    border: 4px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--text-light);
  }

  /* CONFIG PANEL */
  .config-panel {
    position: fixed;
    top: 0; right: 0;
    width: 100%;
    max-width: 380px;
    height: 100vh;
    background: var(--card-bg);
    box-shadow: -4px 0 24px rgba(0,0,0,0.15);
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.3s ease, background-color 0.3s;
    display: flex;
    flex-direction: column;
  }

  .config-panel.open { transform: translateX(0); }

  .config-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .config-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--dark);
  }

  .config-close {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 22px;
    color: var(--text-light);
    padding: 4px;
    line-height: 1;
  }

  .config-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }

  .config-section { margin-bottom: 24px; }

  .config-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .config-field { margin-bottom: 14px; }

  .config-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    display: block;
  }

  .config-input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, background-color 0.3s, color 0.3s;
  }
  .config-input:focus { border-color: var(--orange); }

  .config-btn {
    width: 100%;
    padding: 11px;
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 7px;
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 6px;
  }
  .config-btn:hover { background: #c9420a; }

  /* TOGGLE SWITCH */
  .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; cursor: pointer; inset: 0;
    background-color: var(--border); transition: .3s; border-radius: 24px;
  }
  .slider:before {
    position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
    background-color: white; transition: .3s; border-radius: 50%;
  }
  input:checked + .slider { background-color: var(--orange); }
  input:checked + .slider:before { transform: translateX(20px); }

  /* TOP CONTROLS */
  .controls {
    padding: 12px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1600px;
    margin: 0 auto;
  }

  .last-update { font-size: 12px; color: var(--text-light); }

  .controls-right { display: flex; gap: 8px; align-items: center; }

  .btn-icon {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 14px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
    font-family: 'Montserrat', sans-serif;
  }
  .btn-icon:hover { background: var(--orange); color: white; border-color: var(--orange); }

  .refresh-indicator {
    width: 8px; height: 8px; border-radius: 50%; background: #4caf50;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 190; display: none; transition: opacity 0.3s;
  }
  .overlay.show { display: block; }

  /* CARD MODIFICATIONS FOR EMPTY HOLDER */
  .card.empty-holder { opacity: 0.75; }
  body.dark-theme .card.empty-holder { opacity: 0.5; }

  /* MEDIA QUERIES */
  @media (max-width: 1200px) {
    .section-row { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 992px) {
    .section-row { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 768px) {
    .section-row { grid-template-columns: repeat(2, 1fr); }
    .header-title { font-size: 20px; }
    .mas-img, .prusa-img { height: 36px; }
  }
  @media (max-width: 480px) {
    .header { padding: 12px 16px; }
    .header-title { font-size: 15px; letter-spacing: 1px; }
    .mas-img, .prusa-img { height: 26px; }
    
    .dashboard { padding: 16px; }
    .section-row { grid-template-columns: 1fr; gap: 12px; } 
    
    .controls { flex-direction: column; align-items: flex-start; gap: 12px; padding: 12px 16px 0; }
    .controls-right { width: 100%; display: flex; gap: 10px; }
    .btn-icon { flex: 1; }
    
    .gauge-container { max-width: 280px; margin: 0 auto; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader-ring"></div>
  <div class="loading-text">NAČÍTAVAM DÁTA...</div>
</div>

<div class="overlay" id="overlay" onclick="closeConfig()"></div>

<div class="config-panel" id="configPanel">
  <div class="config-header">
    <div class="config-title">⚙ NASTAVENIA</div>
    <button class="config-close" onclick="closeConfig()">✕</button>
  </div>
  <div class="config-body">
    <div class="config-section">
      <div class="config-section-title">Vzhľad</div>
      <div class="config-field" style="display:flex; align-items:center; justify-content:space-between;">
        <label class="config-label" style="margin:0;">Tmavý režim (Dark mode)</label>
        <label class="switch">
          <input type="checkbox" id="cfgDarkMode" onchange="toggleDarkMode()">
          <span class="slider round"></span>
        </label>
      </div>
    </div>
    <div class="config-section">
      <div class="config-section-title">Automatická obnova</div>
      <div class="config-field">
        <label class="config-label">Interval obnovy (minúty)</label>
        <input class="config-input" id="cfgInterval" type="number" value="2" min="1" max="60" />
      </div>
      <button class="config-btn" onclick="saveAndLoad()">💾 ULOŽIŤ</button>
    </div>
  </div>
</div>

<div class="header">
  <div class="header-logo">
    <img src="MAS.png" alt="MAS" class="mas-img" />
  </div>
  <div class="header-title">FILAMENT MONITOR</div>
  <div class="prusa-logo">
    <img src="prusa.svg" alt="Prusa Research" class="prusa-img" />
  </div>
</div>

<div class="controls">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="refresh-indicator" id="refreshDot"></div>
    <span class="last-update" id="lastUpdate">Posledná aktualizácia: –</span>
  </div>
  <div class="controls-right">
    <button class="btn-icon" onclick="refreshData()">↻ OBNOVIŤ</button>
    <button class="btn-icon" onclick="openConfig()">⚙ NASTAVENIA</button>
  </div>
</div>

<div class="dashboard">
  <div class="section-row" id="row-mk3s"></div>
  <div class="section-row" id="row-xl"></div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const HARDCODED_URL = 'https://script.google.com/macros/s/AKfycbx9s_1ZtZWvnLcaMMHCKziu2fZdqXWcaiJ47197buBIW533-KCTv1td0vsD_voGS_-M/exec';

let CONFIG = {
  interval: parseInt(localStorage.getItem('interval') || '2'),
  darkMode: localStorage.getItem('darkMode') === 'true'
};

let refreshTimer = null;

// Sleduje, či ide o úplne prvé načítanie stránky v prehliadači
let isInitialLoad = true;

// ─── INIT THEME IMMEDIATELY ────────────────────────────────────────────────
if (CONFIG.darkMode) {
  document.body.classList.add('dark-theme');
  document.getElementById('cfgDarkMode').checked = true;
}

// ─── SPOOL DEFINITIONS ─────────────────────────────────────────────────────
const MK3S_SPOOLS = [
  { id: 'spool-01', label: 'PRUSA 01', type: 'MK3S' },
  { id: 'spool-02', label: 'PRUSA 02', type: 'MK3S' },
  { id: 'spool-03', label: 'PRUSA 03', type: 'MK3S' },
  { id: 'spool-04', label: 'PRUSA 04', type: 'MK4S' },
  { id: 'spool-05', label: 'PRUSA 05', type: 'MK4S' },
];

const XL_SPOOLS = [
  { id: 'spool-XL01', label: 'TOOL 01', type: 'XL' },
  { id: 'spool-XL02', label: 'TOOL 02', type: 'XL' },
  { id: 'spool-XL03', label: 'TOOL 03', type: 'XL' },
  { id: 'spool-XL04', label: 'TOOL 04', type: 'XL' },
  { id: 'spool-XL05', label: 'TOOL 05', type: 'XL' },
];

// ─── GAUGE SVG S PODMIENENOU ANIMÁCIOU ─────────────────────────────────────
function createGaugeSVG(value, max) {
  const pct = max > 0 ? Math.min(value / max, 1) : 0;
  const cx = 100, cy = 98, r = 74;

  function polar(deg) {
    const rad = deg * Math.PI / 180;
    return [
      cx + r * Math.cos(rad),
      cy - r * Math.sin(rad)
    ];
  }

  const [sx, sy] = polar(180);
  const [ex, ey] = polar(0);
  const pathDef = `M ${sx.toFixed(2)} ${sy.toFixed(2)} A ${r} ${r} 0 1 1 ${ex.toFixed(2)} ${ey.toFixed(2)}`;

  const color = pct <= 0 ? 'var(--gauge-track)' : pct < 0.15 ? '#e65100' : '#E8500A';

  const pathLength = 232.48;
  const targetOffset = pathLength * (1 - pct);

  // Aplikuje animáciu výplne grafu len pri úvodnom načítaní
  const animStyle = isInitialLoad 
    ? `style="--target-offset: ${targetOffset}; animation: gaugeFill 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;"`
    : `style="stroke-dashoffset: ${targetOffset};"`;

  return `
    <svg viewBox="0 0 200 108" class="gauge-svg" xmlns="http://www.w3.org/2000/svg">
      <path d="${pathDef}" fill="none" stroke="var(--gauge-track)" stroke-width="13" stroke-linecap="round"/>
      ${pct > 0.001 ? `
        <path d="${pathDef}" fill="none" stroke="${color}" stroke-width="13" stroke-linecap="round"
              stroke-dasharray="${pathLength}" 
              ${animStyle} />
      ` : ''}
    </svg>
  `;
}

// ─── RENDER CARD S PODMIENENOU ANIMÁCIOU ───────────────────────────────────
function renderCard(spool, data, index = 0) {
  const hasData = !!data;
  const jsonIsEmpty = hasData ? data.isEmpty : true;
  const weight = hasData && data.weight !== null ? data.weight : null;
  const length = hasData && data.length !== null ? data.length : null;
  const material = hasData ? (data.material || '') : '';
  const colorHex = hasData ? (data.color || 'FFFFFF') : 'FFFFFF';
  const ts = hasData ? data.ts : null;
  const staleMinutes = hasData ? data.staleMinutes : null;

  const maxWeight = 1000;
  
  let isHolderEmpty = false;
  let statusBadge = '';

  if (!hasData || jsonIsEmpty || (staleMinutes !== null && staleMinutes > 120)) {
    isHolderEmpty = true;
    statusBadge = `<span class="status-badge status-empty"><span class="status-dot"></span>Prázdny držiak</span>`;
  } else if (weight === 0) {
    statusBadge = `<span class="status-badge status-empty"><span class="status-dot"></span>Prázdna cievka</span>`;
  } else if (weight !== null && weight < 50) {
    statusBadge = `<span class="status-badge status-low"><span class="status-dot"></span>Málo filamentu</span>`;
  } else {
    statusBadge = `<span class="status-badge status-ok"><span class="status-dot"></span>OK</span>`;
  }

  const gaugeVal = (weight !== null && !isHolderEmpty) ? weight : 0;

  let timeAgo = '';
  if (ts) {
    if (staleMinutes === 0) timeAgo = 'práve teraz';
    else if (staleMinutes === 1) timeAgo = 'pred 1 min';
    else if (staleMinutes < 60) timeAgo = `pred ${staleMinutes} min`;
    else if (staleMinutes < 1440) timeAgo = `pred ${Math.floor(staleMinutes/60)} hod`;
    else timeAgo = `pred ${Math.floor(staleMinutes/1440)} dňami`;
    
    timeAgo = `${ts} (${timeAgo})`;
  }

  const bgStyle = `#${colorHex.replace('#','')}`;

  const weightDisplay = (!isHolderEmpty && weight !== null) 
    ? weight.toLocaleString('sk', {minimumFractionDigits:1, maximumFractionDigits:1}) 
    : '-';
    
  const lengthDisplay = (!isHolderEmpty && length !== null) 
    ? length.toLocaleString('sk', {minimumFractionDigits:1, maximumFractionDigits:1}) 
    : '-';

  let materialDisplay = '';
  if (isHolderEmpty) {
    materialDisplay = `<span class="material-name empty">-</span>`;
  } else {
    materialDisplay = `
      <div class="color-dot" style="background:${bgStyle};"></div>
      <span class="material-name${!material ? ' empty' : ''}">${material || 'Neznámy materiál'}</span>
    `;
  }

  // Pre úvodné načítanie priradíme animáciu, inak ostane bežná karta
  const animClass = isInitialLoad ? ' animate-pop' : '';
  const animStyle = isInitialLoad ? `style="animation-delay: ${index * 0.05}s;"` : '';

  return `
    <div class="card${isHolderEmpty ? ' empty-holder' : ''}${animClass}" ${animStyle}>
      <div class="card-header">
        <span class="printer-type">${spool.type}</span>
        <span class="printer-name">${spool.label}</span>
      </div>

      <div class="gauge-container">
        ${createGaugeSVG(gaugeVal, maxWeight)}
        <div class="gauge-value" style="color:${gaugeVal < 50 && !isHolderEmpty ? '#e65100' : 'var(--dark)'}">
          ${weightDisplay}
        </div>
        <div class="gauge-minmax">
          <span>0</span>
          <span style="position:absolute;left:50%;transform:translateX(-50%);color:var(--text-light);font-size:9px;">Váha (g)</span>
          <span>1 tis.</span>
        </div>
      </div>

      <div class="material-row">
        ${materialDisplay}
      </div>

      <div class="stat-row">
        <span class="stat-label">Dĺžka (m)</span>
        <span class="stat-value${isHolderEmpty ? ' empty' : ''}">
          ${lengthDisplay}
        </span>
      </div>

      ${statusBadge}
      ${timeAgo ? `<div class="timestamp">${timeAgo}</div>` : '<div class="timestamp">–</div>'}
    </div>
  `;
}

// ─── RENDER ALL ────────────────────────────────────────────────────────────
function renderDashboard(dataMap) {
  const mk3sEl = document.getElementById('row-mk3s');
  const xlEl = document.getElementById('row-xl');

  mk3sEl.innerHTML = MK3S_SPOOLS.map((s, i) => renderCard(s, dataMap[s.id] || null, i)).join('');
  xlEl.innerHTML = XL_SPOOLS.map((s, i) => renderCard(s, dataMap[s.id] || null, i + MK3S_SPOOLS.length)).join('');
}

// ─── FETCH FROM GOOGLE APPS SCRIPT ─────────────────────────────────────────
async function fetchSheetData() {
  const url = `${HARDCODED_URL}?action=getData`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    
    const map = {};
    if (json && json.spools && Array.isArray(json.spools)) {
      json.spools.forEach(row => {
        map[row.id] = {
          nfc:          row.nfc || '',
          material:     row.material || '',
          color:        (row.color || 'FFFFFF').replace('#', ''),
          weight:       typeof row.weight === 'number' ? row.weight : null,
          length:       typeof row.length === 'number' ? row.length : null,
          temp:         row.temp !== null ? row.temp : null,
          hum:          row.hum !== null ? row.hum : null,
          ts:           row.ts || null,
          staleMinutes: row.staleMinutes !== null ? row.staleMinutes : null,
          isEmpty:      row.isEmpty || false
        };
      });
    }
    return map;
  } catch (e) {
    console.error('Chyba pri načítaní:', e);
    return null;
  }
}

// ─── REFRESH ────────────────────────────────────────────────────────────────
async function refreshData() {
  document.getElementById('refreshDot').style.background = '#ff9800';

  let dataMap = await fetchSheetData();
  if (!dataMap) dataMap = {}; 

  renderDashboard(dataMap);
  
  // Po úplne prvom reálnom načítaní dát vypneme efekt skákania (pre ďalšie refreshe)
  isInitialLoad = false;
  
  document.getElementById('lastUpdate').textContent =
    'Posledná aktualizácia: ' + new Date().toLocaleTimeString('sk');
  document.getElementById('refreshDot').style.background = '#4caf50';
  hideLoader();
}

function hideLoader() {
  document.getElementById('loadingOverlay').classList.add('hidden');
}

// ─── CONFIG UI & THEME ──────────────────────────────────────────────────────
function openConfig() {
  document.getElementById('cfgInterval').value = CONFIG.interval;
  document.getElementById('cfgDarkMode').checked = CONFIG.darkMode;
  document.getElementById('configPanel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closeConfig() {
  document.getElementById('configPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function toggleDarkMode() {
  const isDark = document.getElementById('cfgDarkMode').checked;
  CONFIG.darkMode = isDark;
  localStorage.setItem('darkMode', isDark);

  if (isDark) {
    document.body.classList.add('dark-theme');
  } else {
    document.body.classList.remove('dark-theme');
  }
}

// ─── INIT ───────────────────────────────────────────────────────────────────
function saveAndLoad() {
  CONFIG.interval = parseInt(document.getElementById('cfgInterval').value) || 2;
  localStorage.setItem('interval', CONFIG.interval);
  
  closeConfig();
  startAutoRefresh();
  
  document.getElementById('loadingOverlay').classList.remove('hidden');
  refreshData();
}

function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(refreshData, CONFIG.interval * 60 * 1000);
}

// Odstránené zbytočné vykresľovanie prázdnych elementov pred zistením skutočných dát
window.addEventListener('DOMContentLoaded', () => {
  startAutoRefresh();
  refreshData();
});
</script>
